<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered List</title>
</head>

<body>
    <ol>
        <li>Itam 1</li>
        <li>Itam 2</li>
        <li>Itam 3</li>
    </ol>

    <ol type="a">
        <li>Itam 1</li>
        <li>Itam 2</li>
        <li>Itam 3</li>
    </ol>

    <ol type="A">
        <li>Itam 1</li>
        <li>Itam 2</li>
        <li>Itam 3</li>
    </ol>

    <ol type="i">
        <li>Itam 1</li>
        <li>Itam 2</li>
        <li>Itam 3</li>
    </ol>

    <ol type="I">
        <li>Itam 1</li>
        <li>Itam 2</li>
        <li>Itam 3</li>
    </ol>
    <ol type="a" start="100">
        <li>Itam 1</li>
        <li>Itam 2</li>
        <li>Itam 3</li>
    </ol>
</body>

</html>
