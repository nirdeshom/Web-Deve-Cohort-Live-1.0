<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unordered List</title>
</head>
<body>
<!-- Un-Ordered List Tag -->
<ul>
    <li>Itam 1</li>
    <li>Itam 2</li>
    <li>Itam 3</li>
    <li>Itam 4</li>
</ul>
<ul type="square">
    <li>Itam 1</li>
    <li>Itam 2</li>
    <li>Itam 3</li>
    <li>Itam 4</li>
</ul>
<ul type="circle">
    <li>Itam 1</li>
    <li>Itam 2</li>
    <li>Itam 3</li>
    <li>Itam 4</li>
</ul>
<ul type="none">
    <li>Itam 1</li>
    <li>Itam 2</li>
    <li>Itam 3</li>
    <li>Itam 4</li>
</ul>
<ul type="disc">
    <li>Itam 1</li>
    <li>Itam 2</li>
    <li>Itam 3</li>
    <li>Itam 4</li>
</ul>
</body>
</html>
